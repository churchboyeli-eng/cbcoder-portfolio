# Nginx Reverse Proxy Configuration for Next.js Server

# Rate limiting zone definition
# Place this at the top of nginx.conf inside the http { ... } block in main Nginx config if needed:
# limit_req_zone $binary_remote_addr zone=one:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name cbvisuals.com www.cbvisuals.com; # Replace with production domain

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name cbvisuals.com www.cbvisuals.com; # Replace with production domain

    # SSL Certificate Configuration (Uncomment and adjust paths in production)
    # ssl_certificate /etc/letsencrypt/live/cbvisuals.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/cbvisuals.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 1d;

    # Gzip Compression
    gzip on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_vary on;
    gzip_min_length 1000;

    # Root workspace path for static fallback if needed
    root /var/www/cbcoder-portfolio;

    # Disable directory listing
    autoindex off;

    # Apply rate limiting
    # limit_req zone=one burst=20 nodelay;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://images.unsplash.com https://img.youtube.com https://via.placeholder.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; connect-src 'self';" always;

    # Serve Next.js static files directly from .next/static/ for high performance
    location /_next/static/ {
        alias /var/www/cbcoder-portfolio/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Serve public static assets (images, videos, fonts) directly via Nginx
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|mp4|webm|woff2?|eot|ttf|otf)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, must-revalidate";
        try_files $uri @nextjs;
    }

    # Reverse Proxy all other requests to the running Next.js Node.js server
    location / {
        proxy_pass http://127.0.0.1:3000; # Points to the local Node.js process (PM2/next start)
        proxy_http_version 1.1;
        
        # WebSockets support (for hot reload or WebSockets connections)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Pass headers to backend server
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Fallback backend location block
    location @nextjs {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
